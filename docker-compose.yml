services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: querybuilder
      POSTGRES_USER: qb
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qb -d querybuilder"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://qb:${DB_PASSWORD:-devpassword}@db:5432/querybuilder
      NEXT_PUBLIC_LLM_ENABLED: "false"
      FASTAPI_BASE_URL: ""
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
